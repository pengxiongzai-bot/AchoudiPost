name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for attempt in 1 2 3; do
            npm ci --no-audit --no-fund && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            npm cache verify || true
            sleep "$((attempt * 15))"
          done

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test --workspaces --if-present

      - name: Build
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          rm -rf /tmp/freedompost-deploy
          mkdir -p /tmp/freedompost-deploy
          rsync -a --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "runtime" \
            --exclude "coverage" \
            --exclude "apps/*/dist" \
            ./ /tmp/freedompost-deploy/
          tar -czf freedompost-deploy.tar.gz -C /tmp/freedompost-deploy .

      - name: Verify deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          VISITOR_HASH_SALT: ${{ secrets.VISITOR_HASH_SALT }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_PASSWORD DEPLOY_PATH COOKIE_SECRET VISITOR_HASH_SALT ADMIN_PASSWORD POSTGRES_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: "freedompost-deploy.tar.gz"
          target: "/tmp"
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          VISITOR_HASH_SALT: ${{ secrets.VISITOR_HASH_SALT }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: DEPLOY_PATH,COOKIE_SECRET,VISITOR_HASH_SALT,ADMIN_PASSWORD,POSTGRES_PASSWORD
          command_timeout: 30m
          script: |
            set -eu
            mkdir -p "$DEPLOY_PATH"
            tar -xzf /tmp/freedompost-deploy.tar.gz -C "$DEPLOY_PATH"
            rm -f /tmp/freedompost-deploy.tar.gz
            cd "$DEPLOY_PATH"
            if [ ! -f .env ]; then
              {
                printf '%s\n' "NODE_ENV=production"
                printf '%s\n' "PORT=3000"
                printf '%s\n' "HOST=0.0.0.0"
                printf '%s\n' "LOG_LEVEL=info"
                printf '%s\n' "API_BODY_LIMIT_BYTES=104857600"
                printf '%s\n' "UPLOAD_MAX_BYTES=524288000"
                printf 'COOKIE_SECRET=%s\n' "$COOKIE_SECRET"
                printf 'VISITOR_HASH_SALT=%s\n' "$VISITOR_HASH_SALT"
                printf '%s\n' "ADMIN_USERNAME=admin"
                printf 'ADMIN_PASSWORD=%s\n' "$ADMIN_PASSWORD"
                printf '%s\n' "POSTGRES_DB=freedompost"
                printf '%s\n' "POSTGRES_USER=freedompost"
                printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
                printf 'DATABASE_URL=postgres://freedompost:%s@postgres:5432/freedompost\n' "$POSTGRES_PASSWORD"
                printf '%s\n' "FREEDOMPOST_REPOSITORY=postgres"
                printf '%s\n' "STORAGE_DRIVER=local"
                printf '%s\n' "LOCAL_STORAGE_ROOT=runtime/local-storage"
                printf '%s\n' "PUBLIC_UPLOAD_BASE_URL=/api/uploads"
              } > .env
              chmod 600 .env
            fi
            if ! command -v curl >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                apt-get update
                apt-get install -y curl ca-certificates
              elif command -v dnf >/dev/null 2>&1; then
                dnf install -y curl ca-certificates
              elif command -v yum >/dev/null 2>&1; then
                yum install -y curl ca-certificates
              else
                echo "curl is required to install Docker"
                exit 1
              fi
            fi
            if ! command -v docker >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                rm -f /etc/apt/sources.list.d/docker.list /etc/apt/sources.list.d/docker-ce.list
                rm -f /etc/apt/keyrings/docker.asc
                apt-get update
                DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl docker.io
                DEBIAN_FRONTEND=noninteractive apt-get install -y docker-compose-v2 || DEBIAN_FRONTEND=noninteractive apt-get install -y docker-compose
              elif command -v dnf >/dev/null 2>&1; then
                dnf install -y dnf-plugins-core || dnf install -y yum-utils
                dnf config-manager --add-repo https://mirrors.aliyun.com/docker-ce/linux/centos/docker-ce.repo
                dnf install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              elif command -v yum >/dev/null 2>&1; then
                yum install -y yum-utils
                yum-config-manager --add-repo https://mirrors.aliyun.com/docker-ce/linux/centos/docker-ce.repo
                yum install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              else
                curl --retry 5 --retry-delay 5 -fsSL https://get.docker.com -o /tmp/get-docker.sh
                sh /tmp/get-docker.sh
              fi
            fi
            if command -v systemctl >/dev/null 2>&1; then
              systemctl enable --now docker
            elif command -v service >/dev/null 2>&1; then
              service docker start
            fi
            mkdir -p /etc/docker
            cat > /etc/docker/daemon.json <<'JSON'
            {
              "registry-mirrors": [
                "https://docker.m.daocloud.io",
                "https://hub-mirror.c.163.com",
                "https://mirror.baidubce.com"
              ]
            }
            JSON
            if command -v systemctl >/dev/null 2>&1; then
              systemctl restart docker
            elif command -v service >/dev/null 2>&1; then
              service docker restart
            fi
            compose() {
              if docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              elif command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
              else
                echo "Docker Compose is required"
                exit 1
              fi
            }
            docker version
            compose version
            for attempt in 1 2 3; do
              compose -f deploy/docker-compose.yml pull postgres redis && break
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep "$((attempt * 20))"
            done
            compose -f deploy/docker-compose.yml up -d postgres redis
            compose -f deploy/docker-compose.yml build app nginx
            compose -f deploy/docker-compose.yml run --rm app npm run db:migrate:prod
            compose -f deploy/docker-compose.yml up -d --build
            curl -fsS http://127.0.0.1:3000/health
            curl -fsS http://127.0.0.1/ >/dev/null
