name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test --workspaces --if-present

      - name: Build
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          rm -rf /tmp/freedompost-deploy
          mkdir -p /tmp/freedompost-deploy
          rsync -a --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "runtime" \
            --exclude "coverage" \
            --exclude "apps/*/dist" \
            ./ /tmp/freedompost-deploy/
          tar -czf freedompost-deploy.tar.gz -C /tmp/freedompost-deploy .

      - name: Verify deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          VISITOR_HASH_SALT: ${{ secrets.VISITOR_HASH_SALT }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_PASSWORD DEPLOY_PATH COOKIE_SECRET VISITOR_HASH_SALT ADMIN_PASSWORD POSTGRES_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: "freedompost-deploy.tar.gz"
          target: "/tmp"
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            set -eu
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            tar -xzf /tmp/freedompost-deploy.tar.gz -C "${{ secrets.DEPLOY_PATH }}"
            rm -f /tmp/freedompost-deploy.tar.gz
            cd "${{ secrets.DEPLOY_PATH }}"
            if [ ! -f .env ]; then
              cat > .env <<'ENVEOF'
NODE_ENV=production
PORT=3000
HOST=0.0.0.0
LOG_LEVEL=info
API_BODY_LIMIT_BYTES=104857600
UPLOAD_MAX_BYTES=524288000
COOKIE_SECRET=${{ secrets.COOKIE_SECRET }}
VISITOR_HASH_SALT=${{ secrets.VISITOR_HASH_SALT }}
ADMIN_USERNAME=admin
ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
POSTGRES_DB=freedompost
POSTGRES_USER=freedompost
POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
DATABASE_URL=postgres://freedompost:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/freedompost
FREEDOMPOST_REPOSITORY=postgres
STORAGE_DRIVER=local
LOCAL_STORAGE_ROOT=runtime/local-storage
PUBLIC_UPLOAD_BASE_URL=/api/uploads
ENVEOF
              chmod 600 .env
            fi
            docker compose -f deploy/docker-compose.yml up -d postgres redis
            docker compose -f deploy/docker-compose.yml build app nginx
            docker compose -f deploy/docker-compose.yml run --rm app npm run db:migrate:prod
            docker compose -f deploy/docker-compose.yml up -d --build
            curl -fsS http://127.0.0.1:3000/health
            curl -fsS http://127.0.0.1/ >/dev/null
