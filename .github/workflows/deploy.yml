name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for attempt in 1 2 3; do
            npm ci --no-audit --no-fund && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            npm cache verify || true
            sleep "$((attempt * 15))"
          done

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test --workspaces --if-present

      - name: Build
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          rm -rf /tmp/freedompost-deploy
          mkdir -p /tmp/freedompost-deploy
          rsync -a --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "runtime" \
            --exclude "coverage" \
            --exclude "apps/*/dist" \
            ./ /tmp/freedompost-deploy/
          tar -czf freedompost-deploy.tar.gz -C /tmp/freedompost-deploy .

      - name: Verify deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          VISITOR_HASH_SALT: ${{ secrets.VISITOR_HASH_SALT }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          PREVIEW_DOMAIN: ${{ secrets.PREVIEW_DOMAIN }}
          STORAGE_DRIVER: ${{ secrets.STORAGE_DRIVER }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          R2_PREFIX: ${{ secrets.R2_PREFIX }}
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH COOKIE_SECRET VISITOR_HASH_SALT ADMIN_PASSWORD POSTGRES_PASSWORD PREVIEW_DOMAIN STORAGE_DRIVER; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ -z "$DEPLOY_PASSWORD" ] && [ -z "$DEPLOY_KEY" ]; then
            echo "::error::Missing GitHub secret: DEPLOY_PASSWORD or DEPLOY_KEY"
            missing=1
          fi
          if [ "$STORAGE_DRIVER" = "oss" ]; then
            for name in ALIYUN_OSS_REGION ALIYUN_OSS_BUCKET ALIYUN_OSS_ACCESS_KEY_ID ALIYUN_OSS_ACCESS_KEY_SECRET; do
              if [ -z "${!name}" ]; then
                echo "::error::Missing GitHub secret: $name"
                missing=1
              fi
            done
          fi
          if [ "$STORAGE_DRIVER" = "r2" ]; then
            for name in R2_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY; do
              if [ -z "${!name}" ]; then
                echo "::error::Missing GitHub secret: $name"
                missing=1
              fi
            done
          fi
          exit "$missing"

      - name: Prepare server disk
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_KEY == '' && secrets.DEPLOY_PASSWORD || '' }}
          key: ${{ secrets.DEPLOY_KEY }}
          command_timeout: 5m
          script: |
            set -eu
            rm -f /tmp/freedompost-deploy.tar.gz
            if command -v docker >/dev/null 2>&1; then
              if [ "$(id -u)" -eq 0 ]; then
                docker builder prune --all --force || true
                docker image prune --all --force || true
                docker system df || true
              else
                sudo docker builder prune --all --force || true
                sudo docker image prune --all --force || true
                sudo docker system df || true
              fi
            fi

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_KEY == '' && secrets.DEPLOY_PASSWORD || '' }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "freedompost-deploy.tar.gz"
          target: "/tmp"
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          VISITOR_HASH_SALT: ${{ secrets.VISITOR_HASH_SALT }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          PREVIEW_DOMAIN: ${{ secrets.PREVIEW_DOMAIN }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          STORAGE_DRIVER: ${{ secrets.STORAGE_DRIVER }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ secrets.ALIYUN_OSS_PUBLIC_BASE_URL }}
          ALIYUN_OSS_PREFIX: ${{ secrets.ALIYUN_OSS_PREFIX }}
          ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          R2_PREFIX: ${{ secrets.R2_PREFIX }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_KEY == '' && secrets.DEPLOY_PASSWORD || '' }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: DEPLOY_PATH,COOKIE_SECRET,VISITOR_HASH_SALT,ADMIN_PASSWORD,POSTGRES_PASSWORD,PREVIEW_DOMAIN,DEPLOY_HOST,STORAGE_DRIVER,ALIYUN_OSS_REGION,ALIYUN_OSS_BUCKET,ALIYUN_OSS_ENDPOINT,ALIYUN_OSS_PUBLIC_BASE_URL,ALIYUN_OSS_PREFIX,ALIYUN_OSS_ACCESS_KEY_ID,ALIYUN_OSS_ACCESS_KEY_SECRET,R2_ACCOUNT_ID,R2_BUCKET,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_ENDPOINT,R2_PUBLIC_BASE_URL,R2_PREFIX
          command_timeout: 30m
          script: |
            set -eu
            if [ "$(id -u)" -eq 0 ]; then
              SUDO=""
            else
              SUDO="sudo"
            fi
            $SUDO mkdir -p "$DEPLOY_PATH"
            $SUDO chown "$(id -u):$(id -g)" "$DEPLOY_PATH"
            tar -xzf /tmp/freedompost-deploy.tar.gz -C "$DEPLOY_PATH"
            rm -f /tmp/freedompost-deploy.tar.gz
            cd "$DEPLOY_PATH"
            if [ ! -f .env ]; then
              {
                printf '%s\n' "NODE_ENV=production"
                printf '%s\n' "PORT=3000"
                printf '%s\n' "HOST=0.0.0.0"
                printf '%s\n' "LOG_LEVEL=info"
                printf 'PREVIEW_DOMAIN=%s\n' "$PREVIEW_DOMAIN"
                printf 'ORIGIN_TEST_HOST=%s\n' "$DEPLOY_HOST"
                printf 'PUBLIC_SITE_URL=https://%s\n' "$PREVIEW_DOMAIN"
                printf 'VITE_PUBLIC_SITE_URL=https://%s\n' "$PREVIEW_DOMAIN"
                printf '%s\n' "COOKIE_SECURE=true"
                printf '%s\n' "API_BODY_LIMIT_BYTES=104857600"
                printf '%s\n' "UPLOAD_MAX_BYTES=524288000"
                printf 'COOKIE_SECRET=%s\n' "$COOKIE_SECRET"
                printf 'VISITOR_HASH_SALT=%s\n' "$VISITOR_HASH_SALT"
                printf '%s\n' "ADMIN_USERNAME=admin"
                printf 'ADMIN_PASSWORD=%s\n' "$ADMIN_PASSWORD"
                printf '%s\n' "POSTGRES_DB=freedompost"
                printf '%s\n' "POSTGRES_USER=freedompost"
                printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
                printf 'DATABASE_URL=postgres://freedompost:%s@postgres:5432/freedompost\n' "$POSTGRES_PASSWORD"
                printf '%s\n' "FREEDOMPOST_REPOSITORY=postgres"
                printf 'STORAGE_DRIVER=%s\n' "$STORAGE_DRIVER"
                printf '%s\n' "LOCAL_STORAGE_ROOT=runtime/local-storage"
                printf '%s\n' "PUBLIC_UPLOAD_BASE_URL=/api/uploads"
              } > .env
              chmod 600 .env
            fi
            set_env() {
              key="$1"
              value="$2"
              env_tmp="$(mktemp)"
              awk -v key="$key" -v value="$value" '
                BEGIN { found = 0 }
                $0 ~ "^" key "=" {
                  print key "=" value
                  found = 1
                  next
                }
                { print }
                END {
                  if (!found) {
                    print key "=" value
                  }
                }
              ' .env > "$env_tmp"
              cat "$env_tmp" > .env
              rm -f "$env_tmp"
            }
            set_env_if_present() {
              key="$1"
              value="${2:-}"
              if [ -n "$value" ]; then
                set_env "$key" "$value"
              fi
            }
            set_env "PREVIEW_DOMAIN" "$PREVIEW_DOMAIN"
            set_env "ORIGIN_TEST_HOST" "$DEPLOY_HOST"
            set_env "PUBLIC_SITE_URL" "https://$PREVIEW_DOMAIN"
            set_env "VITE_PUBLIC_SITE_URL" "https://$PREVIEW_DOMAIN"
            set_env "COOKIE_SECURE" "true"
            set_env "STORAGE_DRIVER" "$STORAGE_DRIVER"
            if [ "$STORAGE_DRIVER" = "oss" ]; then
              set_env "ALIYUN_OSS_REGION" "$ALIYUN_OSS_REGION"
              set_env "ALIYUN_OSS_BUCKET" "$ALIYUN_OSS_BUCKET"
              set_env "ALIYUN_OSS_ACCESS_KEY_ID" "$ALIYUN_OSS_ACCESS_KEY_ID"
              set_env "ALIYUN_OSS_ACCESS_KEY_SECRET" "$ALIYUN_OSS_ACCESS_KEY_SECRET"
              set_env_if_present "ALIYUN_OSS_ENDPOINT" "${ALIYUN_OSS_ENDPOINT:-}"
              set_env_if_present "ALIYUN_OSS_PUBLIC_BASE_URL" "${ALIYUN_OSS_PUBLIC_BASE_URL:-}"
              set_env_if_present "ALIYUN_OSS_PREFIX" "${ALIYUN_OSS_PREFIX:-}"
            fi
            if [ "$STORAGE_DRIVER" = "r2" ]; then
              set_env "R2_ACCOUNT_ID" "$R2_ACCOUNT_ID"
              set_env "R2_BUCKET" "${R2_BUCKET:-freedompost}"
              set_env "R2_ACCESS_KEY_ID" "$R2_ACCESS_KEY_ID"
              set_env "R2_SECRET_ACCESS_KEY" "$R2_SECRET_ACCESS_KEY"
              set_env_if_present "R2_ENDPOINT" "${R2_ENDPOINT:-}"
              set_env "R2_PUBLIC_BASE_URL" "${R2_PUBLIC_BASE_URL:-https://r2pic.openal.uk}"
              set_env "R2_PREFIX" "${R2_PREFIX:-freedompost/uploads}"
            fi
            chmod 600 .env
            if [ "$(awk '/MemTotal/ { print $2 }' /proc/meminfo)" -lt 1800000 ] && ! grep -q '^/swapfile ' /proc/swaps; then
              if [ ! -f /swapfile ]; then
                $SUDO fallocate -l 2G /swapfile || $SUDO dd if=/dev/zero of=/swapfile bs=1M count=2048
              fi
              $SUDO chmod 600 /swapfile
              $SUDO mkswap /swapfile
              $SUDO swapon /swapfile
              grep -q '^/swapfile ' /etc/fstab || echo '/swapfile none swap sw 0 0' | $SUDO tee -a /etc/fstab >/dev/null
            fi
            if ! command -v curl >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                $SUDO apt-get update
                $SUDO apt-get install -y curl ca-certificates
              elif command -v dnf >/dev/null 2>&1; then
                $SUDO dnf install -y curl ca-certificates
              elif command -v yum >/dev/null 2>&1; then
                $SUDO yum install -y curl ca-certificates
              else
                echo "curl is required to install Docker"
                exit 1
              fi
            fi
            if ! command -v docker >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                $SUDO rm -f /etc/apt/sources.list.d/docker.list /etc/apt/sources.list.d/docker-ce.list
                $SUDO rm -f /etc/apt/keyrings/docker.asc
                $SUDO apt-get update
                $SUDO env DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl docker.io
                $SUDO env DEBIAN_FRONTEND=noninteractive apt-get install -y docker-compose-v2 || $SUDO env DEBIAN_FRONTEND=noninteractive apt-get install -y docker-compose
              elif command -v dnf >/dev/null 2>&1; then
                $SUDO dnf install -y dnf-plugins-core || $SUDO dnf install -y yum-utils
                $SUDO dnf config-manager --add-repo https://mirrors.aliyun.com/docker-ce/linux/centos/docker-ce.repo
                $SUDO dnf install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              elif command -v yum >/dev/null 2>&1; then
                $SUDO yum install -y yum-utils
                $SUDO yum-config-manager --add-repo https://mirrors.aliyun.com/docker-ce/linux/centos/docker-ce.repo
                $SUDO yum install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              else
                curl --retry 5 --retry-delay 5 -fsSL https://get.docker.com -o /tmp/get-docker.sh
                $SUDO sh /tmp/get-docker.sh
              fi
            fi
            if command -v systemctl >/dev/null 2>&1; then
              $SUDO systemctl enable --now docker
            elif command -v service >/dev/null 2>&1; then
              $SUDO service docker start
            fi
            $SUDO mkdir -p /etc/docker
            cat <<'JSON' | $SUDO tee /etc/docker/daemon.json >/dev/null
            {
              "registry-mirrors": [
                "https://docker.m.daocloud.io",
                "https://hub-mirror.c.163.com",
                "https://mirror.baidubce.com"
              ]
            }
            JSON
            if command -v systemctl >/dev/null 2>&1; then
              $SUDO systemctl restart docker
            elif command -v service >/dev/null 2>&1; then
              $SUDO service docker restart
            fi
            docker_cmd() {
              if [ -n "$SUDO" ]; then
                $SUDO docker "$@"
              else
                docker "$@"
              fi
            }
            compose() {
              if docker_cmd compose version >/dev/null 2>&1; then
                docker_cmd compose "$@"
              elif command -v docker-compose >/dev/null 2>&1; then
                if [ -n "$SUDO" ]; then
                  $SUDO docker-compose "$@"
                else
                  docker-compose "$@"
                fi
              else
                echo "Docker Compose is required"
                exit 1
              fi
            }
            docker_cmd version
            compose version
            if command -v ufw >/dev/null 2>&1; then
              $SUDO ufw allow 80/tcp || true
              $SUDO ufw allow 443/tcp || true
            fi
            if command -v firewall-cmd >/dev/null 2>&1 && firewall-cmd --state >/dev/null 2>&1; then
              $SUDO firewall-cmd --permanent --add-service=http || true
              $SUDO firewall-cmd --permanent --add-service=https || true
              $SUDO firewall-cmd --reload || true
            fi
            if command -v iptables >/dev/null 2>&1; then
              $SUDO iptables -C INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || $SUDO iptables -I INPUT -p tcp --dport 80 -j ACCEPT || true
              $SUDO iptables -C INPUT -p tcp --dport 443 -j ACCEPT 2>/dev/null || $SUDO iptables -I INPUT -p tcp --dport 443 -j ACCEPT || true
            fi
            for attempt in 1 2 3; do
              compose --env-file .env -f deploy/docker-compose.yml pull postgres redis && break
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep "$((attempt * 20))"
            done
            compose --env-file .env -f deploy/docker-compose.yml up -d postgres redis
            # Keep named volumes and running images, but discard stale build data
            # before compiling. The production host has limited local disk space.
            docker_cmd builder prune --all --force || true
            docker_cmd image prune --all --force || true
            docker_cmd system df || true
            compose --env-file .env -f deploy/docker-compose.yml build app nginx
            compose --env-file .env -f deploy/docker-compose.yml run --rm app npm run db:migrate:prod -w @freedompost/api
            compose --env-file .env -f deploy/docker-compose.yml up -d --force-recreate app nginx
            for attempt in $(seq 1 60); do
              if curl -fsS http://127.0.0.1:3000/health \
                && curl -fsS -H "Host: $DEPLOY_HOST" http://127.0.0.1/ >/dev/null; then
                exit 0
              fi
              sleep 2
            done
            compose --env-file .env -f deploy/docker-compose.yml ps
            compose --env-file .env -f deploy/docker-compose.yml logs --tail=120 app nginx
            exit 1
