server {
  listen 80;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/freedompost/public;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name _;

  root /var/www/freedompost/public;
  index index.html;

  ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https: blob:; media-src 'self' https: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

  client_max_body_size 512m;

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /uploads/ {
    alias /var/www/freedompost/uploads/;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location /p/ {
    try_files $uri $uri/ $uri/index.html @app;
    add_header Cache-Control "public, max-age=60, stale-while-revalidate=600";
  }

  location /search/ {
    try_files $uri @app;
    add_header Cache-Control "public, max-age=60, stale-while-revalidate=600";
  }

  location /api/ {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
  }

  location /admin/ {
    try_files $uri $uri/ /admin/index.html @app;
    add_header Cache-Control "no-store";
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "public, max-age=60, stale-while-revalidate=600";
  }

  location @app {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
