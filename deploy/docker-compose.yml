services:
  nginx:
    build:
      context: ..
      dockerfile: deploy/caddy/Dockerfile
    env_file:
      - ../.env
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
      - caddydata:/data
      - caddyconfig:/config

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ../runtime:/app/runtime
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freedompost}
      POSTGRES_USER: ${POSTGRES_USER:-freedompost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

volumes:
  caddydata:
  caddyconfig:
  pgdata:
  redisdata:
